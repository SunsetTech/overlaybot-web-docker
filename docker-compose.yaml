services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        REPO_URL: ${REPO_URL}
        VITE_TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
        VITE_TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI}
        VITE_VIEWER_WS_URI: ${VIEWER_WS_URI}
        CADDYFILE: ${CADDYFILE:-Caddyfile}
      ssh:
        - default
      network: host
      secrets:
        - known_hosts
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    ports:
      - "${FRONT_HTTP_PORT:-8888}:80"
      - "${FRONT_HTTPS_PORT:-8443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        REPO_URL: ${REPO_URL}
        DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
      ssh:
        - default
      network: host
      secrets:
        - known_hosts
    init: true
    environment:
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - BOT_PASSWORD=${BOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
secrets:
  known_hosts:
    file: ${KNOWN_HOSTS_PATH}
volumes:
  caddy_data:
  caddy_config:
  postgres_data:
